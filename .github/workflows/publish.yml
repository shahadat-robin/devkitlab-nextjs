name: Publish to npm

on:
  repository_dispatch:
    types:
      - template_updated
  workflow_dispatch:
    inputs:
      template_ref:
        description: Template repository ref to sync before publishing
        required: false
        default: main
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.target_commitish || github.event.repository.default_branch }}

      - name: Checkout template repository
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TEMPLATE_REPOSITORY }}
          ref: ${{ github.event.client_payload.ref || inputs.template_ref || vars.TEMPLATE_DEFAULT_REF || 'main' }}
          path: .upstream-template
          token: ${{ secrets.TEMPLATE_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Sync template from external repository
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        run: node ./scripts/sync-template.mjs ./.upstream-template ./template

      - name: Bump package version
        if: github.event_name == 'repository_dispatch'
        run: npm version patch --no-git-tag-version

      - name: Commit synced template
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json template
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: sync template"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
