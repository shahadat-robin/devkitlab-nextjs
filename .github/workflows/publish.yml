name: Publish

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - .gitmodules
      - template
      - template/**
  repository_dispatch:
    types:
      - template_updated
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish-main
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          submodules: recursive
          token: ${{ secrets.TEMPLATE_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Configure GitHub auth for submodule updates
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Update template submodule
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        run: |
          git submodule sync --recursive
          git submodule update --init --remote template

      - name: Bump package version
        if: github.event_name == 'repository_dispatch'
        run: npm version patch --no-git-tag-version

      - name: Commit synced template
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitmodules package.json template
          if git diff --cached --quiet; then
            echo "No submodule or version changes to commit"
            exit 0
          fi
          git commit -m "core: submodule(template) updated"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Check if version is already published
        id: version_check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$PUBLISHED_VERSION" = "$PACKAGE_VERSION" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --access public

      - name: Skip publish when version already exists
        if: steps.version_check.outputs.should_publish != 'true'
        run: echo "Version ${{ steps.version_check.outputs.package_version }} of ${{ steps.version_check.outputs.package_name }} is already published."
