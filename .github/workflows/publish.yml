name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - .gitmodules
      - template
  repository_dispatch:
    types:
      - template_updated
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  publish:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.target_commitish || github.event.repository.default_branch }}
          submodules: recursive
          token: ${{ secrets.TEMPLATE_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Configure GitHub auth for submodule updates
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Update template submodule
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        run: |
          git submodule sync --recursive
          git submodule update --init --remote template

      - name: Bump package version
        if: github.event_name == 'repository_dispatch'
        run: npm version patch --no-git-tag-version

      - name: Commit synced template
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitmodules package.json template
          if git diff --cached --quiet; then
            echo "No submodule or version changes to commit"
            exit 0
          fi
          git commit -m "chore: update template submodule"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
